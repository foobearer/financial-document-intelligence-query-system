name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Rename Dockerfile.spaces → Dockerfile for HF Spaces
        run: |
          cp Dockerfile.spaces Dockerfile
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add Dockerfile
          git commit -m "ci: rename Dockerfile.spaces to Dockerfile for HF Spaces" || echo "No changes to commit"

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://joyceeparagas:$HF_TOKEN@huggingface.co/spaces/joyceeparagas/finDocIQ
          git push hf main --force
